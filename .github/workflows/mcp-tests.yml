# MCP Integration Tests
#
# Runs comprehensive MCP tests including unit, integration, agent, performance, and security tests.
# @see .specs/04-mcp-testing.md section 8.2 for requirements

name: MCP Tests

on:
  push:
    branches: ['main']
    paths:
      - 'packages/api/mcp/**'
      - 'packages/shared/src/mcp/**'
      - '.github/workflows/mcp-tests.yml'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'packages/api/mcp/**'
      - 'packages/shared/src/mcp/**'

jobs:
  unit-tests:
    name: MCP Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @srcbook/shared build

      - name: Run MCP unit tests
        run: pnpm --filter @srcbook/api test:mcp:unit

  integration-tests:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run MCP integration tests
        run: pnpm --filter @srcbook/api test:mcp:integration

  agent-tests:
    name: MCP Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run MCP agent tests
        run: pnpm --filter @srcbook/api test:mcp:agent

  security-tests:
    name: MCP Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @srcbook/shared build

      - name: Run MCP security tests
        run: pnpm --filter @srcbook/api test:mcp:security

  performance-tests:
    name: MCP Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on main branch pushes to avoid slowing down PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [integration-tests, agent-tests]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Run MCP performance tests
        run: pnpm --filter @srcbook/api test:mcp:performance

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: mcp-performance-results
          path: packages/api/test-results/performance/
          if-no-files-found: ignore

  coverage:
    name: MCP Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, security-tests]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @srcbook/shared build

      - name: Run MCP tests with coverage
        run: pnpm --filter @srcbook/api test:mcp:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-coverage-report
          path: packages/api/coverage/
          if-no-files-found: ignore
